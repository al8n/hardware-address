# Tarpaulin config, auto-loaded from the workspace root.
#
# The `pyo3`/`wasm-bindgen` binding code is exercised by separate
# language-specific test harnesses (pytest for the `python` crate,
# `wasm-pack test` via the npm scripts) rather than by Rust-level
# tests. Counting those files in Rust coverage skews the number to
# ~63% even though the core library itself is ~99% covered.
#
# These patterns are glob-matched against file paths in the workspace.
[default]
exclude-files = [
    "src/py.rs",
    "src/wasm.rs",
    "python/*",
    "wasm/*",
]
